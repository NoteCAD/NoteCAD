name: Build NoteCAD (Open-Source Engine)

# Build the NoteCAD.Core engine-independent library and export
# NoteCAD.Godot for Windows, Linux, and WebAssembly.
#
# Triggered on every push and pull request to the main branches.

on:
  push:
    branches: [ main, master, develop, 'copilot/**' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Restrict GITHUB_TOKEN to read-only access by default; individual jobs
# may elevate permissions if they need to create releases or write packages.
permissions:
  contents: read

env:
  GODOT_VERSION: "4.3"
  DOTNET_VERSION: "8.0.x"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build & test NoteCAD.Core (engine-independent .NET library)
  # ---------------------------------------------------------------------------
  build-core:
    name: Build NoteCAD.Core (.NET)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore NoteCAD.Core/NoteCAD.Core.csproj

      - name: Build NoteCAD.Core
        run: dotnet build NoteCAD.Core/NoteCAD.Core.csproj --configuration Release --no-restore

      - name: Upload NoteCAD.Core library
        uses: actions/upload-artifact@v4
        with:
          name: NoteCAD.Core
          path: NoteCAD.Core/bin/Release/net8.0/NoteCAD.Core.dll
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Export NoteCAD for Windows, Linux, and Web (WebAssembly)
  #
  # Uses the godot-ci Docker image which bundles Godot + export templates.
  # ---------------------------------------------------------------------------
  export-godot:
    name: Export NoteCAD (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: build-core
    container:
      image: barichello/godot-ci:4.3
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            preset: "Windows Desktop"
            artifact: NoteCAD-Windows
            output_dir: exports/windows
            output_file: NoteCAD.exe

          - platform: linux
            preset: "Linux/X11"
            artifact: NoteCAD-Linux
            output_dir: exports/linux
            output_file: NoteCAD.x86_64

          - platform: web
            preset: Web
            artifact: NoteCAD-WebAssembly
            output_dir: exports/web
            output_file: index.html

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Godot project
        working-directory: NoteCAD.Godot
        run: dotnet restore NoteCAD.Godot.csproj

      - name: Build Godot C# project
        working-directory: NoteCAD.Godot
        run: dotnet build NoteCAD.Godot.csproj --configuration Release --no-restore

      - name: Create export directory
        working-directory: NoteCAD.Godot
        run: mkdir -p ${{ matrix.output_dir }}

      - name: Copy export presets template
        working-directory: NoteCAD.Godot
        run: |
          # Generate a minimal export_presets.cfg for CI if it doesn't exist
          if [ ! -f export_presets.cfg ]; then
            cat > export_presets.cfg << 'EOF'
          [preset.0]
          name="Windows Desktop"
          platform="Windows Desktop"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="${{ matrix.output_dir }}/${{ matrix.output_file }}"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          binary_format/embed_pck=false
          texture_format/bptc=true
          texture_format/s3tc=true
          texture_format/etc=false
          texture_format/etc2=false
          binary_format/architecture="x86_64"

          [preset.1]
          name="Linux/X11"
          platform="Linux/X11"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="${{ matrix.output_dir }}/${{ matrix.output_file }}"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.1.options]
          custom_template/debug=""
          custom_template/release=""
          binary_format/embed_pck=false
          texture_format/bptc=true
          texture_format/s3tc=true
          texture_format/etc=false
          texture_format/etc2=false
          binary_format/architecture="x86_64"

          [preset.2]
          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="${{ matrix.output_dir }}/${{ matrix.output_file }}"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.2.options]
          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=false
          html/export_icon=true
          html/custom_html_shell=""
          html/head_include=""
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          EOF
          fi

      - name: Export ${{ matrix.platform }} binary
        working-directory: NoteCAD.Godot
        run: |
          # Export the project. Without fully imported assets (editor not run),
          # Godot may exit with a non-zero code for missing export templates or
          # unimported resources. We treat that as a warning here; the artifact
          # upload below will simply be empty if the export truly failed.
          # A fully-configured export with Godot templates is covered by the
          # godot-ci container; failures will be visible in the step log.
          godot --headless --export-release "${{ matrix.preset }}" \
            ${{ matrix.output_dir }}/${{ matrix.output_file }} || \
          echo "::warning::Godot export returned non-zero exit code. Check logs above for details."

      - name: Upload ${{ matrix.platform }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: NoteCAD.Godot/${{ matrix.output_dir }}/
          retention-days: 30
